name: GEOSUPPLY Gas Benchmark

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  gas-benchmark:
    name: Run Gas Measurements
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run gas benchmark and capture output
        run: |
          mkdir -p gas-report
          npx hardhat test test/test_gas_benchmark.js \
            --reporter spec 2>&1 | tee gas-report/gas_results.txt || true
          echo "---" >> gas-report/gas_results.txt
          echo "Run date: $(date)" >> gas-report/gas_results.txt
          echo "Solidity 0.8.20 | Hardhat EVM | Optimizer: 200 runs" >> gas-report/gas_results.txt
          cat gas-report/gas_results.txt

      - name: Upload gas report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gas-benchmark-results
          path: gas-report/gas_results.txt
          retention-days: 30
